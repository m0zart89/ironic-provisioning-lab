[DEFAULT]
# Transport URL for RabbitMQ — used between API and conductor
transport_url = rabbit://ironic:ironic@rabbitmq:5672/ironic

# Authentication strategy: keystone for prod, noauth for standalone lab
auth_strategy = noauth

[database]
connection = mysql+pymysql://ironic:ironic@mysql/ironic?charset=utf8mb4

[conductor]
# Heartbeat interval — lower in lab to catch stuck conductors faster
heartbeat_interval = 10
# How long before a conductor is considered dead
heartbeat_timeout = 60

[deploy]
# HTTP server serving deploy images to IPA agent on nodes
http_url = http://192.168.100.1:8080
http_root = /var/lib/ironic/httpboot

[pxe]
# PXE config templates
pxe_config_template = $pybasedir/drivers/modules/pxe_config.template
tftp_server = 192.168.100.1
tftp_root = /var/lib/ironic/tftpboot

[dhcp]
dhcp_provider = neutron  # or 'none' for external DHCP in standalone mode

[neutron]
url = http://neutron:9696

[glance]
auth_url = http://keystone:5000
auth_type = password

[ipmi]
# Retry IPMI commands — hardware varies in reliability
command_retry_timeout = 60
min_command_interval = 8

[inspector]
endpoint_override = http://ironic-inspector:5050
auth_type = noauth
